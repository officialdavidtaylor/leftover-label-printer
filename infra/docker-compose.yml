name: leftover-label-printer

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /docker-entrypoint-init-replset.sh
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_REPLICA_SET_HOST: ${MONGO_REPLICA_SET_HOST:-127.0.0.1:27017}
    volumes:
      - mongo_data:/data/db
      - ./mongo/keyfile:/etc/mongo-keyfile-source/keyfile:ro
      - ./mongo/docker-entrypoint-init-replset.sh:/docker-entrypoint-init-replset.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --quiet -u "$${MONGO_INITDB_ROOT_USERNAME}" -p "$${MONGO_INITDB_ROOT_PASSWORD}"
          --authenticationDatabase admin
          --eval "try { rs.status().ok } catch (error) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '$${MONGO_REPLICA_SET_HOST}' }] }).ok }"
          | grep -q 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  emqx:
    image: emqx/emqx:5.8
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTHENTICATION__1__ENABLE: "true"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__DENY_ACTION: disconnect
      EMQX_AUTHORIZATION__SOURCES__1__TYPE: file
      EMQX_AUTHORIZATION__SOURCES__1__ENABLE: "true"
      EMQX_AUTHORIZATION__SOURCES__1__PATH: /opt/emqx/etc/acl.conf
      EMQX_LISTENERS__TCP__DEFAULT__ENABLE: ${EMQX_ENABLE_PLAIN_MQTT:-true}
      EMQX_LISTENERS__WSS__DEFAULT__ENABLE: "false"
      EMQX_LISTENERS__SSL__DEFAULT__ENABLE: ${EMQX_REQUIRE_TLS:-false}
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: /opt/emqx/etc/certs/${EMQX_TLS_CA_CERT_FILE:-ca.crt}
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /opt/emqx/etc/certs/${EMQX_TLS_CERT_FILE:-server.crt}
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: /opt/emqx/etc/certs/${EMQX_TLS_KEY_FILE:-server.key}
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: verify_none
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "false"
    volumes:
      - emqx_data:/opt/emqx/data
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - ./emqx/certs:/opt/emqx/etc/certs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - emqx ctl status >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:9000/minio/health/live >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    restart: unless-stopped
    command:
      - start-dev
      - --http-port=8080
    ports:
      - "9000:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_HOSTNAME: http://localhost:9000
      KC_HTTP_PORT: 8080
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /usr/bin/bash -lc
          "exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          head -n 1 <&3 | grep -q '200 OK'"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

volumes:
  mongo_data:
  emqx_data:
  minio_data:
  keycloak_data:
